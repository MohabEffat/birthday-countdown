<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Little Garden, Just for You 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fff9fb;
      font-family: 'Lato', sans-serif;
      overflow-x: hidden;
      padding-bottom: 60px;
    }

    /* floating flowers */
    .floating-flowers { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .ff { position: absolute; opacity: 0.15; animation: drift linear infinite; }
    @keyframes drift {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.15; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* hero */
    .hero { text-align: center; padding: 52px 20px 24px; position: relative; z-index: 1; }
    .hero-emoji { font-size: 52px; display: block; margin-bottom: 12px; animation: bloom 2s ease-in-out infinite alternate; }
    @keyframes bloom { from { transform: scale(1); } to { transform: scale(1.1); } }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #7b2d5e; margin-bottom: 8px; }
    .divider { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px auto 28px; color: #e8a0b8; font-size: 18px; }
    .divider-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #e8a0b8); }
    .divider-line.r { background: linear-gradient(90deg, #e8a0b8, transparent); }
    .subtitle { font-size: 14px; color: #c07090; text-align: center; margin-bottom: 36px; font-style: italic; padding: 0 20px; position: relative; z-index: 1; }

    /* cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    .card {
      border-radius: 20px;
      border: 1.5px solid #f5d0de;
      padding: 28px 24px 36px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-align: center;
      position: relative;
    }
    .card:hover { transform: translateY(-5px); border-color: #e080a0; box-shadow: 0 10px 32px rgba(180,80,110,0.13); }
    .card-icon { font-size: 38px; margin-bottom: 14px; display: block; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 17px; color: #7b2d5e; font-weight: 700; margin-bottom: 10px; }
    .card-preview { font-size: 14px; color: #a05070; line-height: 1.7; font-weight: 300; }
    .card-tag { display: inline-block; margin-top: 14px; font-size: 11px; letter-spacing: 1.2px; color: #d06080; text-transform: uppercase; border: 1px solid #f0b0c8; border-radius: 20px; padding: 3px 12px; }
    .card-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 1px; color: #d06080; text-transform: uppercase; white-space: nowrap; }

    /* countdown card */
    .countdown-card { background: linear-gradient(135deg, #ffe8f0 0%, #ffd6e8 100%) !important; border-color: #e075a0 !important; }
    .countdown-num { font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 700; color: #c0396a; line-height: 1; margin-bottom: 4px; }
    .countdown-label { font-size: 12px; letter-spacing: 2px; color: #e0709a; text-transform: uppercase; margin-bottom: 10px; }

    /* modal overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(80, 10, 30, 0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 24px;
      padding: 44px 36px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 2px solid #f0b0c8;
      position: relative;
      animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 20px;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 400;
      transition: opacity 0.15s;
    }
    .modal-close:hover { opacity: 0.7; }

    .modal-icon { font-size: 52px; margin-bottom: 16px; display: block; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #7b2d5e; margin-bottom: 16px; font-weight: 700; }
    .modal-body { font-size: 15px; color: #905070; line-height: 1.85; font-weight: 300; margin-bottom: 24px; }
    .modal-days { font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 700; color: #c0396a; line-height: 1; }
    .modal-days-label { font-size: 13px; letter-spacing: 2px; color: #e0709a; text-transform: uppercase; margin-bottom: 16px; }

    .modal-btn {
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 12px 32px;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      transition: opacity 0.2s;
    }
    .modal-btn:hover { opacity: 0.85; }

    @media (max-width: 500px) {
      .hero h1 { font-size: 24px; }
      .cards-grid { grid-template-columns: 1fr; }
      .modal { padding: 36px 24px 28px; }
    }
  </style>
</head>
<body>

<div class="floating-flowers" id="flowers"></div>

<div class="hero">
  <span class="hero-emoji">🌸</span>
  <h1>A Little Garden, Just for You</h1>
  <div class="divider">
    <div class="divider-line"></div>🌺<div class="divider-line r"></div>
  </div>
</div>

<p class="subtitle">Choose a card — each one holds something made with care 💕</p>

<div class="cards-grid" id="cardsGrid"></div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <span class="modal-icon" id="mIcon"></span>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-body" id="mBody"></div>
    <button class="modal-btn" id="mBtn" onclick="closeModal()">Close 🌷</button>
  </div>
</div>

<script>
  const cards = [
    {
      icon: "🌹", title: "You Make It Better", tag: "Just so you know",
      preview: "Every day is a little nicer...",
      bg: "#fff0f4", btnColor: "#c0607a",
      message: "Every day is genuinely a little nicer because you're in it. Not in a dramatic way — just in the quiet, reliable way that makes everything feel a bit more okay. You probably don't notice it, but I do. 🌹"
    },
    {
      icon: "🦋", title: "Honestly Though", tag: "Real talk",
      preview: "You're kind of remarkable...",
      bg: "#f5f0ff", btnColor: "#7060c0",
      message: "You're kind of remarkable, and I don't think you hear that enough. The way you handle things, the way you show up — it doesn't go unnoticed. You're doing great, even on the days it doesn't feel like it. 🦋"
    },
    {
      icon: "🌼", title: "The Small Stuff", tag: "A reminder",
      preview: "I notice the little things...",
      bg: "#fffce0", btnColor: "#b09020",
      message: "I notice the little things — the way you get excited about stuff, the small habits, the way you laugh when something actually catches you off guard. Those are my favorite things. Don't change them. 🌼"
    },
    {
      icon: "🍃", title: "No Big Speech", tag: "From me to you",
      preview: "I'll keep this simple...",
      bg: "#eef8f0", btnColor: "#3a8a55",
      message: "I'll keep this simple: you matter a lot. To more people than you probably realize. And I'm glad I get to be one of them. That's it. That's the whole message. 🍃"
    },
    {
      icon: "🌙", title: "Late Night Thought", tag: "Quietly",
      preview: "Sometimes I think about how lucky...",
      bg: "#eaecff", btnColor: "#5060c0",
      message: "Sometimes I think about how differently things could've gone — different timing, different choices — and I'm just really glad they didn't. Having you around is something I don't take for granted. 🌙"
    },
    {
      icon: "🎂", title: "Your Day Is Coming...", tag: "Countdown",
      isCountdown: true,
      bg: "#ffe8f0", btnColor: "#c0396a",
      message: "August 1st is almost here. Hope your birthday is exactly as good as you deserve — which means it better be pretty great. See you on the other side of it. 🎂"
    }
  ];

  function getDaysLeft() {
    const now = new Date();
    const yr = (now.getMonth() > 6 || (now.getMonth() === 6 && now.getDate() >= 1))
      ? now.getFullYear() + 1 : now.getFullYear();
    const bday = new Date(yr, 6, 31, 23, 59, 59);
    return Math.ceil((bday - now) / (1000 * 60 * 60 * 24));
  }

  function openModal(card) {
    document.getElementById('mIcon').textContent = card.icon;
    document.getElementById('mTitle').textContent = card.title;
    document.getElementById('mBtn').style.background = card.btnColor;
    document.getElementById('modalClose').style.color = card.btnColor;

    const body = document.getElementById('mBody');
    if (card.isCountdown) {
      const days = getDaysLeft();
      body.innerHTML = `
        <div class="modal-days">${days}</div>
        <div class="modal-days-label">days until your birthday 🎉</div>
        <p style="font-size:14px;color:#a05070;line-height:1.8;">${card.message}</p>
      `;
    } else {
      body.innerHTML = `<p>${card.message}</p>`;
    }

    document.getElementById('overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
  }

  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Build cards
  const grid = document.getElementById('cardsGrid');
  const days = getDaysLeft();

  cards.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card' + (card.isCountdown ? ' countdown-card' : '');
    if (!card.isCountdown) el.style.background = card.bg;

    if (card.isCountdown) {
      el.innerHTML = `
        <span class="card-icon">${card.icon}</span>
        <div class="card-title">${card.title}</div>
        <div class="countdown-num">${days}</div>
        <div class="countdown-label">days to go</div>
        <div class="card-preview">August 1st — your special day is almost here!</div>
        <span class="card-hint">tap to open ↓</span>
      `;
    } else {
      el.innerHTML = `
        <span class="card-icon">${card.icon}</span>
        <div class="card-title">${card.title}</div>
        <div class="card-preview">${card.preview}</div>
        <span class="card-tag">${card.tag}</span>
        <span class="card-hint">tap to open ↓</span>
      `;
    }

    el.addEventListener('click', () => openModal(card));
    grid.appendChild(el);
  });

  // Floating flowers
  const emojis = ['🌸','🌺','🌼','🌻','🌷','🍀','🌹'];
  const fc = document.getElementById('flowers');
  for (let i = 0; i < 20; i++) {
    const f = document.createElement('div');
    f.className = 'ff';
    f.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    f.style.cssText = `left:${Math.random()*100}%;bottom:-40px;animation-duration:${9+Math.random()*12}s;animation-delay:${Math.random()*18}s;font-size:${14+Math.random()*14}px;`;
    fc.appendChild(f);
  }
</script>
</body>
</html>
