<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Little Garden, Just for You 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #fff9fb; font-family: 'Lato', sans-serif; overflow-x: hidden; padding-bottom: 60px; }
    .floating-flowers { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .ff { position: absolute; animation: drift linear infinite; }
    @keyframes drift { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.18; } 90% { opacity: 0.18; } 100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
    .hero { text-align: center; padding: 52px 20px 24px; position: relative; z-index: 1; }
    .hero-emoji { font-size: 52px; display: block; margin-bottom: 12px; animation: bloom 2s ease-in-out infinite alternate; }
    @keyframes bloom { from { transform: scale(1); } to { transform: scale(1.1); } }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #7b2d5e; margin-bottom: 8px; }
    .divider { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px auto 28px; color: #e8a0b8; font-size: 18px; }
    .divider-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #e8a0b8); }
    .divider-line.r { background: linear-gradient(90deg, #e8a0b8, transparent); }
    .subtitle { font-size: 14px; color: #c07090; text-align: center; margin-bottom: 36px; font-style: italic; padding: 0 20px; position: relative; z-index: 1; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; max-width: 860px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    .card { border-radius: 20px; border: 1.5px solid #f5d0de; padding: 28px 24px 36px; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; text-align: center; position: relative; }
    .card:hover { transform: translateY(-5px); border-color: #e080a0; box-shadow: 0 10px 32px rgba(180,80,110,0.13); }
    .card-icon { font-size: 38px; margin-bottom: 14px; display: block; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 17px; color: #7b2d5e; font-weight: 700; margin-bottom: 10px; }
    .card-preview { font-size: 14px; color: #a05070; line-height: 1.7; font-weight: 300; }
    .card-tag { display: inline-block; margin-top: 14px; font-size: 11px; letter-spacing: 1.2px; color: #d06080; text-transform: uppercase; border: 1px solid #f0b0c8; border-radius: 20px; padding: 3px 12px; }
    .card-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 1px; color: #d06080; text-transform: uppercase; white-space: nowrap; }
    .countdown-card { background: linear-gradient(135deg, #ffe8f0 0%, #ffd6e8 100%) !important; border-color: #e075a0 !important; }
    .countdown-num { font-family: 'Playfair Display', serif; font-size: 64px; font-weight: 700; color: #c0396a; line-height: 1; margin-bottom: 4px; }
    .countdown-label { font-size: 12px; letter-spacing: 2px; color: #e0709a; text-transform: uppercase; margin-bottom: 10px; }
    .rose-card { padding: 0 !important; overflow: hidden; border-color: #c0304a !important; background: #1a0008 !important; }
    .rose-card-img { width: 100%; height: 210px; object-fit: cover; object-position: center top; border-radius: 18px 18px 0 0; display: block; }
    .rose-card-body { padding: 16px 20px 36px; }
    .rose-card-title { font-family: 'Playfair Display', serif; font-size: 15px; color: #f0c0c8; font-weight: 700; margin-bottom: 6px; }
    .rose-card-quote { font-size: 13px; color: #d08090; line-height: 1.7; font-style: italic; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(20,0,10,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 24px; padding: 44px 36px 36px; max-width: 440px; width: 100%; text-align: center; border: 2px solid #f0b0c8; position: relative; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); max-height: 90vh; overflow-y: auto; }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-close { position: absolute; top: 14px; right: 18px; font-size: 20px; cursor: pointer; background: none; border: none; line-height: 1; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; }
    .modal-close:hover { opacity: 0.7; }
    .modal-icon { font-size: 52px; margin-bottom: 16px; display: block; }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #7b2d5e; margin-bottom: 16px; font-weight: 700; }
    .modal-body { font-size: 15px; color: #905070; line-height: 1.85; font-weight: 300; margin-bottom: 24px; }
    .modal-body .rose-full-img { width: 100%; border-radius: 16px; margin-bottom: 20px; display: block; }
    .rose-modal-quote { font-family: 'Playfair Display', serif; font-size: 20px; color: #7b2d5e; font-style: italic; line-height: 1.7; }
    .modal-days { font-family: 'Playfair Display', serif; font-size: 80px; font-weight: 700; color: #c0396a; line-height: 1; }
    .modal-days-label { font-size: 13px; letter-spacing: 2px; color: #e0709a; text-transform: uppercase; margin-bottom: 16px; }
    .modal-btn { color: #fff; border: none; border-radius: 30px; padding: 12px 32px; font-size: 14px; letter-spacing: 1px; cursor: pointer; font-family: 'Lato', sans-serif; transition: opacity 0.2s; }
    .modal-btn:hover { opacity: 0.85; }
    @media (max-width: 500px) { .hero h1 { font-size: 24px; } .cards-grid { grid-template-columns: 1fr; } .modal { padding: 36px 24px 28px; } }
  </style>
</head>
<body>
<div class="floating-flowers" id="flowers"></div>
<div class="hero">
  <span class="hero-emoji">🌸</span>
  <h1>A Little Garden, Just for You</h1>
  <div class="divider"><div class="divider-line"></div>🌺<div class="divider-line r"></div></div>
</div>
<p class="subtitle">Choose a card — each one holds something made with care 💕</p>
<div class="cards-grid" id="cardsGrid"></div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <span class="modal-icon" id="mIcon"></span>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-body" id="mBody"></div>
    <button class="modal-btn" id="mBtn" onclick="closeModal()">Close 🌷</button>
  </div>
</div>

    { key:'card_4', icon:'🌙', title:'Late Night Thought',    tag:'Quietly',          preview:'Sometimes I think about how lucky...', bg:'#eaecff', btnColor:'#5060c0', message:"Sometimes I think about how differently things could've gone — different timing, different choices — and I'm just really glad they didn't. Having you around is something I don't take for granted. 🌙" },
    { key:'card_5', icon:'🎂', title:'Your Day Is Coming...', tag:'Countdown', isCountdown:true, bg:'#ffe8f0', btnColor:'#c0396a',    message:"August 1st is almost here. Hope your birthday is exactly as good as you deserve — which means it better be pretty great. See you on the other side of it. 🎂" },
    { key:'card_6', icon:'🌹', title:'For You',               tag:'A thought', isRose:true, bg:'#1a0008', btnColor:'#c0304a' }
  ];

  function getDaysLeft() {
    const now = new Date();
    const yr = (now.getMonth() > 7 || (now.getMonth() === 7 && now.getDate() >= 1)) ? now.getFullYear() + 1 : now.getFullYear();
    return Math.ceil((new Date(yr, 7, 1, 0, 0, 0) - now) / (1000 * 60 * 60 * 24));
  }

  function openModal(card) {
    sendTelegram(card.icon + ' <b>Card opened: "' + card.title + '"</b>\n\n🕐 ' + nowStr() + '\n' + getDevice());
    document.getElementById('mIcon').textContent  = card.isRose ? '' : card.icon;
    document.getElementById('mTitle').textContent = card.isRose ? '' : card.title;
    document.getElementById('mBtn').style.background = card.btnColor;
    document.getElementById('modalClose').style.color = card.btnColor;
    const body = document.getElementById('mBody');
    if (card.isRose) {
      body.innerHTML = '<img class="rose-full-img" src="' + ROSE_IMG + '" alt="A rose for you" />'
        + '<div class="rose-modal-quote">"It would be a better life,<br>If we were Together."</div>';
    } else if (card.isCountdown) {
      const days = getDaysLeft();
      body.innerHTML = '<div class="modal-days">' + days + '</div>'
        + '<div class="modal-days-label">days until your birthday 🎉</div>'
        + '<p style="font-size:14px;color:#a05070;line-height:1.8;">' + card.message + '</p>';
    } else {
      body.innerHTML = '<p>' + card.message + '</p>';
    }
    document.getElementById('overlay').classList.add('active');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('active'); }
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  const grid = document.getElementById('cardsGrid');
  cards.forEach(card => {
    const el = document.createElement('div');
    const days = getDaysLeft();
    if (card.isRose) {
      el.className = 'card rose-card';
      el.innerHTML =
        '<img class="rose-card-img" src="' + ROSE_IMG + '" alt="Rose" />'
        + '<div class="rose-card-body">'
        + '<div class="rose-card-title">For You 🌹</div>'
        + '<div class="rose-card-quote">"It would be a better life, If we were Together."</div>'
        + '</div>'
        + '<span class="card-hint" style="color:#f0a0b0;">tap to open ↓</span>';
    } else if (card.isCountdown) {
      el.className = 'card countdown-card';
      el.innerHTML = '<span class="card-icon">' + card.icon + '</span>'
        + '<div class="card-title">' + card.title + '</div>'
        + '<div class="countdown-num">' + days + '</div>'
        + '<div class="countdown-label">days to go</div>'
        + '<div class="card-preview">August 1st — your special day is almost here!</div>'
        + '<span class="card-hint">tap to open ↓</span>';
    } else {
      el.className = 'card';
      el.style.background = card.bg;
      el.innerHTML = '<span class="card-icon">' + card.icon + '</span>'
        + '<div class="card-title">' + card.title + '</div>'
        + '<div class="card-preview">' + card.preview + '</div>'
        + '<span class="card-tag">' + card.tag + '</span>'
        + '<span class="card-hint">tap to open ↓</span>';
    }
    el.addEventListener('click', () => openModal(card));
    grid.appendChild(el);
  });

  const emojis = ['🌸','🌺','🌼','🌻','🌷','🍀','🌹','💐','🌱'];
  const fc = document.getElementById('flowers');
  for (let i = 0; i < 28; i++) {
    const f = document.createElement('div');
    f.className = 'ff';
    f.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    f.style.cssText = 'left:' + (Math.random()*100) + '%;bottom:-40px;animation-duration:' + (8+Math.random()*14) + 's;animation-delay:' + (Math.random()*20) + 's;font-size:' + (13+Math.random()*16) + 'px;';
    fc.appendChild(f);
  }
</script>
</body>
</html>
